name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # Suppress Node 20 deprecation warnings until actions/checkout and
  # astral-sh/setup-uv ship Node 24-native releases.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install GDAL
        run: |
          sudo apt-get update
          sudo apt-get install -y gdal-bin libgdal-dev

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync --python ${{ matrix.python-version }}

      - name: Run tests
        run: uv run --python ${{ matrix.python-version }} pytest -v

      - name: Build wheel and sdist
        run: uv build

  build-check:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - name: Install GDAL
        run: |
          sudo apt-get update
          sudo apt-get install -y gdal-bin libgdal-dev
      - name: Sync dev env
        run: uv sync
      - name: Build distributions
        run: uv build
      - name: Verify wheel imports
        # uv pip install (no `python -m pip` because uv venvs skip pip by default).
        # --reinstall replaces the editable install from `uv sync` with the wheel.
        run: |
          uv pip install --reinstall --no-deps dist/*.whl
          uv run python -c "from maskgeo import GeojsonProcessor, PolygonProcessor, mask_to_geojson, geojson_to_mask; print('imports ok')"
